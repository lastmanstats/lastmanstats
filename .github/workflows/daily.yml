name: Daily Football Content

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC — morning pre-match briefing
    - cron: '30 22 * * *'  # 22:30 UTC — post-match evening results
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modalità di esecuzione'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal      # pipeline completa con upload YouTube
          - dry-run     # fetch + caption, nessun video né upload
          - upset       # template upset manuale (compila i campi sotto)
      upset_template:
        description: 'Template upset (solo se mode=upset)'
        required: false
        default: 'giant_killed'
        type: choice
        options:
          - giant_killed
          - record_goals
          - penalty_drama
          - comeback
          - dark_horse
      team1:
        description: 'TLA squadra 1 es. GER (richiesto se mode=upset)'
        required: false
        default: ''
      team2:
        description: 'TLA squadra 2 es. JPN (richiesto se mode=upset con score)'
        required: false
        default: 'OPP'
      team1_full:
        description: 'Nome esteso squadra 1 per caption es. Germany (opzionale)'
        required: false
        default: ''
      score_home:
        description: 'Gol squadra 1 (solo se mode=upset)'
        required: false
        default: '0'
      score_away:
        description: 'Gol squadra 2 (solo se mode=upset)'
        required: false
        default: '0'

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg unzip

      - name: Verify fonts
        run: |
          ls -lh fonts/
          test -f fonts/BebasNeue-Regular.ttf && echo "[OK] BebasNeue presente" || echo "[WARN] BebasNeue mancante"
          test -f fonts/Inter-Regular.ttf && echo "[OK] Inter presente" || echo "[WARN] Inter mancante"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Validate upset inputs
        if: ${{ inputs.mode == 'upset' }}
        run: |
          if [ -z "${{ inputs.team1 }}" ]; then
            echo "ERROR: team1 obbligatorio in modalità upset."
            exit 1
          fi

      - name: Run pipeline — normal
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'normal' }}
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python main.py

      - name: Run pipeline — dry-run
        if: ${{ inputs.mode == 'dry-run' }}
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py --dry-run

      - name: Run pipeline — upset template
        if: ${{ inputs.mode == 'upset' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python upset_templates.py \
            "${{ inputs.upset_template }}" \
            --team1 "${{ inputs.team1 }}" \
            --team2 "${{ inputs.team2 }}" \
            --team1-full "${{ inputs.team1_full }}" \
            --score-home "${{ inputs.score_home }}" \
            --score-away "${{ inputs.score_away }}"

      - name: Upload TikTok artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-${{ github.run_id }}
          path: |
            output/**/tiktok_*.mp4
            output/**/metadata.json
          retention-days: 7

      - name: Upload YouTube artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-${{ github.run_id }}
          path: output/**/youtube_*.mp4
          retention-days: 7
