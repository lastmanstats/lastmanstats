name: Daily Football Content

on:
  schedule:
    - cron: '0 8 * * *'  # ogni giorno alle 08:00 UTC (10:00 ora italiana)
  workflow_dispatch:      # trigger manuale per testare

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg unzip

      - name: Download fonts
        run: |
          mkdir -p fonts
          # Bebas Neue da Google Fonts
          curl -sL "https://fonts.google.com/download?family=Bebas+Neue" -o /tmp/bebas.zip && \
            unzip -o /tmp/bebas.zip -d /tmp/bebas/ && \
            cp /tmp/bebas/BebasNeue-Regular.ttf fonts/ && \
            echo "[OK] Bebas Neue installato" || echo "[WARN] Bebas Neue non scaricato - uso font di sistema"
          # Inter da Google Fonts
          curl -sL "https://fonts.google.com/download?family=Inter" -o /tmp/inter.zip && \
            unzip -o /tmp/inter.zip -d /tmp/inter/ && \
            cp /tmp/inter/static/Inter-Regular.ttf fonts/ && \
            echo "[OK] Inter installato" || echo "[WARN] Inter non scaricato - uso font di sistema"
          ls fonts/ || true

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python main.py

      - name: Upload TikTok video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-${{ github.run_id }}
          path: output/**/tiktok_*.mp4
          retention-days: 7
